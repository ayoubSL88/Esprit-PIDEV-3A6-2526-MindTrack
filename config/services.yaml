# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    compreface.base_url: 'http://localhost:8000'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    # Configuration pour GoogleOAuthService
    App\Service\GoogleOAuthService:
        arguments:
            $clientId: '%env(GOOGLE_CLIENT_ID)%'
            $clientSecret: '%env(GOOGLE_CLIENT_SECRET)%'
            $redirectUri: '%env(GOOGLE_REDIRECT_URI)%'
    
    # Configuration pour CompreFaceService - CORRIGÉE
    App\Service\CompreFaceService:
        arguments:
            $baseUrl: 'http://localhost:8000'
            $apiKey: '%env(COMPREFACE_API_KEY)%'
            $similarityThreshold: '0.7'      # Valeur par défaut
            $detectionThreshold: '0.6'       # Valeur par défaut
    
    # makes classes in src/ available to be used as services
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\AIExerciceSuggester:
        arguments:
            $exerciceRepo: '@App\Repository\ExerciceRepository'
            $sessionRepo: '@App\Repository\SessionRepository'