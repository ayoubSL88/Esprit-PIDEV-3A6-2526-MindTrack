# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.badcontent.api_key: '%env(default::BADCONTENT_API_KEY)%'
    app.badcontent.model: '%env(default::BADCONTENT_MODEL)%'
    app.badcontent.api_url: '%env(default::BADCONTENT_API_URL)%'
    app.badcontent.site_url: '%env(default::BADCONTENT_SITE_URL)%'
    app.badcontent.site_name: '%env(default::BADCONTENT_SITE_NAME)%'
    app.ollama.url: '%env(default::OLLAMA_API_URL)%'
    app.ollama.model: '%env(default::OLLAMA_MODEL)%'
    app.weather.latitude: 36.8
    app.weather.longitude: 10.18
    app.weather.location_label: 'Tunis'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\CompreFaceService:
        arguments:
            $baseUrl: '%env(COMPREFACE_BASE_URL)%'
            $apiKey: '%env(COMPREFACE_API_KEY)%'
            $similarityThreshold: '%env(COMPREFACE_SIMILARITY_THRESHOLD)%'
            $detectionThreshold: '%env(COMPREFACE_DET_PROB_THRESHOLD)%'

    App\Service\GoogleOAuthService:
        arguments:
            $clientId: '%env(GOOGLE_CLIENT_ID)%'
            $clientSecret: '%env(GOOGLE_CLIENT_SECRET)%'
            $redirectUri: '%env(GOOGLE_REDIRECT_URI)%'

    App\Service\GitHubOAuthService:
        arguments:
            $clientId: '%env(GITHUB_CLIENT_ID)%'
            $clientSecret: '%env(GITHUB_CLIENT_SECRET)%'
            $redirectUri: '%env(GITHUB_REDIRECT_URI)%'

    App\Service\PasswordResetDeliveryService:
        arguments:
            $mode: '%env(PASSWORD_RESET_DELIVERY_MODE)%'
            $fromEmail: '%env(PASSWORD_RESET_FROM_EMAIL)%'
            $fromName: '%env(PASSWORD_RESET_FROM_NAME)%'
            $logFile: '%kernel.project_dir%/var/log/password-reset.log'
            $smtpHost: '%env(PASSWORD_RESET_SMTP_HOST)%'
            $smtpPort: '%env(PASSWORD_RESET_SMTP_PORT)%'
            $smtpEncryption: '%env(PASSWORD_RESET_SMTP_ENCRYPTION)%'
            $smtpUsername: '%env(PASSWORD_RESET_SMTP_USERNAME)%'
            $smtpPassword: '%env(PASSWORD_RESET_SMTP_PASSWORD)%'
    App\Service\Habitude\BadContentDetectionService:
        arguments:
            $apiKey: '%app.badcontent.api_key%'
            $model: '%app.badcontent.model%'
            $apiUrl: '%app.badcontent.api_url%'
            $siteUrl: '%app.badcontent.site_url%'
            $siteName: '%app.badcontent.site_name%'

    App\Service\Habitude\OpenMeteoWeatherService:
        arguments:
            $latitude: '%app.weather.latitude%'
            $longitude: '%app.weather.longitude%'
            $locationLabel: '%app.weather.location_label%'

    App\Service\Chat\OllamaChatService:
        arguments:
            $apiUrl: '%app.ollama.url%'
            $model: '%app.ollama.model%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    # Service IA pour générer les plans d'action
    App\Service\AIPlanificateurService:
        arguments:
            $httpClient: '@http_client'
            $apiKey: '%env(GEMINI_API_KEY)%'

