# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\CompreFaceService:
        arguments:
            $baseUrl: '%env(COMPREFACE_BASE_URL)%'
            $apiKey: '%env(COMPREFACE_API_KEY)%'
            $similarityThreshold: '%env(COMPREFACE_SIMILARITY_THRESHOLD)%'
            $detectionThreshold: '%env(COMPREFACE_DET_PROB_THRESHOLD)%'

    App\Service\GoogleOAuthService:
        arguments:
            $clientId: '%env(GOOGLE_CLIENT_ID)%'
            $clientSecret: '%env(GOOGLE_CLIENT_SECRET)%'
            $redirectUri: '%env(GOOGLE_REDIRECT_URI)%'

    App\Service\GitHubOAuthService:
        arguments:
            $clientId: '%env(GITHUB_CLIENT_ID)%'
            $clientSecret: '%env(GITHUB_CLIENT_SECRET)%'
            $redirectUri: '%env(GITHUB_REDIRECT_URI)%'

    App\Service\PasswordResetDeliveryService:
        arguments:
            $mode: '%env(PASSWORD_RESET_DELIVERY_MODE)%'
            $fromEmail: '%env(PASSWORD_RESET_FROM_EMAIL)%'
            $fromName: '%env(PASSWORD_RESET_FROM_NAME)%'
            $logFile: '%kernel.project_dir%/var/log/password-reset.log'
            $smtpHost: '%env(PASSWORD_RESET_SMTP_HOST)%'
            $smtpPort: '%env(PASSWORD_RESET_SMTP_PORT)%'
            $smtpEncryption: '%env(PASSWORD_RESET_SMTP_ENCRYPTION)%'
            $smtpUsername: '%env(PASSWORD_RESET_SMTP_USERNAME)%'
            $smtpPassword: '%env(PASSWORD_RESET_SMTP_PASSWORD)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
